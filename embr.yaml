version: 1
platform: python
platformVersion: "3.14"

run:
  port: 8080
  startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT

# Managed Postgres — Embr injects DATABASE_URL and runs db/schema.sql on deploy.
database:
  enabled: true

# Managed Valkey (Redis-compatible) cache — Embr injects REDIS_URL.
cache:
  enabled: true

healthCheck:
  path: /api/health
  expectedStatusCode: 200
