<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#e8f5e9"/>
  <text x="10" y="22" font-family="serif" font-size="16" font-weight="bold">Binary Search Tree</text>
  <!-- Edges -->
  <g stroke="#2e7d32" stroke-width="2">
    <line x1="200" y1="70" x2="120" y2="140"/>
    <line x1="200" y1="70" x2="280" y2="140"/>
    <line x1="120" y1="140" x2="70" y2="215"/>
    <line x1="120" y1="140" x2="170" y2="215"/>
    <line x1="280" y1="140" x2="230" y2="215"/>
    <line x1="280" y1="140" x2="330" y2="215"/>
  </g>
  <!-- Nodes -->
  <g font-family="serif" font-size="14" font-weight="bold" text-anchor="middle">
    <g fill="#66bb6a" stroke="#1b5e20" stroke-width="2">
      <circle cx="200" cy="65" r="22"/>
      <circle cx="120" cy="140" r="22"/>
      <circle cx="280" cy="140" r="22"/>
      <circle cx="70" cy="220" r="22"/>
      <circle cx="170" cy="220" r="22"/>
      <circle cx="230" cy="220" r="22"/>
      <circle cx="330" cy="220" r="22"/>
    </g>
    <g fill="#ffffff">
      <text x="200" y="70">8</text>
      <text x="120" y="145">3</text>
      <text x="280" y="145">12</text>
      <text x="70" y="225">1</text>
      <text x="170" y="225">6</text>
      <text x="230" y="225">10</text>
      <text x="330" y="225">14</text>
    </g>
  </g>
  <text x="10" y="275" font-family="serif" font-size="11">Left subtree &lt; parent &lt; right subtree</text>
</svg>
