<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#f3e5f5"/>
  <text x="10" y="22" font-family="serif" font-size="16" font-weight="bold">Animal Cell</text>

  <!-- Cell membrane + cytoplasm -->
  <ellipse cx="215" cy="170" rx="110" ry="85" fill="#ce93d8" stroke="#4a148c" stroke-width="3"/>

  <!-- Nucleus + nucleolus -->
  <circle cx="215" cy="170" r="30" fill="#7b1fa2"/>
  <circle cx="222" cy="166" r="7" fill="#4a148c"/>

  <!-- Mitochondria (two of them) -->
  <g fill="#e57373" stroke="#b71c1c" stroke-width="1">
    <ellipse cx="160" cy="125" rx="20" ry="10"/>
    <ellipse cx="270" cy="220" rx="20" ry="10"/>
  </g>

  <!-- Vacuole -->
  <circle cx="280" cy="130" r="18" fill="#81d4fa" opacity="0.85" stroke="#0277bd"/>

  <!-- Ribosomes -->
  <g fill="#ff8f00">
    <circle cx="170" cy="210" r="3"/>
    <circle cx="180" cy="220" r="3"/>
    <circle cx="190" cy="215" r="3"/>
    <circle cx="175" cy="225" r="3"/>
  </g>

  <!-- Labels with leader lines (all outside the cell) -->
  <g font-family="serif" font-size="11" fill="#333" stroke="none">
    <!-- Cell membrane (top) -->
    <line x1="215" y1="85" x2="215" y2="50" stroke="#666" stroke-width="1"/>
    <text x="215" y="42" text-anchor="middle">Cell membrane</text>

    <!-- Nucleus (right) -->
    <line x1="245" y1="170" x2="345" y2="170" stroke="#666" stroke-width="1"/>
    <text x="348" y="174" text-anchor="start">Nucleus</text>

    <!-- Vacuole (upper right) -->
    <line x1="298" y1="130" x2="365" y2="95" stroke="#666" stroke-width="1"/>
    <text x="365" y="88" text-anchor="middle">Vacuole</text>

    <!-- Mitochondria (left) -->
    <line x1="140" y1="125" x2="80" y2="100" stroke="#666" stroke-width="1"/>
    <text x="78" y="96" text-anchor="end">Mitochondria</text>

    <!-- Ribosomes (lower left) -->
    <line x1="180" y1="225" x2="135" y2="270" stroke="#666" stroke-width="1"/>
    <text x="133" y="282" text-anchor="end">Ribosomes</text>
  </g>
</svg>
