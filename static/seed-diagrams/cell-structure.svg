<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#f3e5f5"/>
  <text x="10" y="22" font-family="serif" font-size="16" font-weight="bold">Animal Cell</text>
  <!-- Cell membrane + cytoplasm -->
  <ellipse cx="200" cy="160" rx="170" ry="115" fill="#ce93d8" stroke="#4a148c" stroke-width="3"/>
  <!-- Nucleus -->
  <circle cx="200" cy="160" r="42" fill="#7b1fa2"/>
  <circle cx="200" cy="160" r="10" fill="#4a148c"/>
  <text x="175" y="165" font-size="12" fill="#ffffff" font-family="serif">Nucleus</text>
  <!-- Mitochondria (2 of them) -->
  <g fill="#e57373" stroke="#b71c1c" stroke-width="1">
    <ellipse cx="110" cy="110" rx="26" ry="12"/>
    <ellipse cx="300" cy="210" rx="26" ry="12"/>
  </g>
  <text x="70" y="90" font-size="11" font-family="serif">Mitochondria</text>
  <!-- Vacuole -->
  <circle cx="300" cy="100" r="22" fill="#81d4fa" opacity="0.85" stroke="#0277bd"/>
  <text x="280" y="70" font-size="11" font-family="serif">Vacuole</text>
  <!-- Ribosomes -->
  <g fill="#ff8f00">
    <circle cx="140" cy="200" r="4"/>
    <circle cx="155" cy="215" r="4"/>
    <circle cx="260" cy="130" r="4"/>
    <circle cx="245" cy="145" r="4"/>
  </g>
  <text x="130" y="240" font-size="11" font-family="serif">Ribosomes</text>
  <!-- Membrane label -->
  <text x="15" y="160" font-size="11" font-family="serif">Cell membrane</text>
  <line x1="80" y1="158" x2="35" y2="158" stroke="#4a148c" stroke-width="1"/>
</svg>
