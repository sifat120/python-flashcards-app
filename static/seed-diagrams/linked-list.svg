<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="200" fill="#fce4ec"/>
  <text x="10" y="22" font-family="serif" font-size="16" font-weight="bold">Linked List</text>
  <g font-family="serif" font-size="14" text-anchor="middle">
    <!-- Node 1 -->
    <rect x="30" y="75" width="70" height="44" fill="#f06292" stroke="#ad1457" stroke-width="2"/>
    <line x1="70" y1="75" x2="70" y2="119" stroke="#ad1457" stroke-width="2"/>
    <text x="50" y="102" fill="#ffffff">10</text>
    <text x="85" y="102" fill="#ffffff">•</text>
    <!-- arrow -->
    <line x1="100" y1="97" x2="140" y2="97" stroke="#333" stroke-width="2"/>
    <polygon points="140,97 132,92 132,102" fill="#333"/>
    <!-- Node 2 -->
    <rect x="140" y="75" width="70" height="44" fill="#f06292" stroke="#ad1457" stroke-width="2"/>
    <line x1="180" y1="75" x2="180" y2="119" stroke="#ad1457" stroke-width="2"/>
    <text x="160" y="102" fill="#ffffff">20</text>
    <text x="195" y="102" fill="#ffffff">•</text>
    <line x1="210" y1="97" x2="250" y2="97" stroke="#333" stroke-width="2"/>
    <polygon points="250,97 242,92 242,102" fill="#333"/>
    <!-- Node 3 -->
    <rect x="250" y="75" width="70" height="44" fill="#f06292" stroke="#ad1457" stroke-width="2"/>
    <line x1="290" y1="75" x2="290" y2="119" stroke="#ad1457" stroke-width="2"/>
    <text x="270" y="102" fill="#ffffff">30</text>
    <text x="305" y="102" fill="#ffffff">•</text>
    <line x1="320" y1="97" x2="355" y2="97" stroke="#333" stroke-width="2"/>
    <polygon points="355,97 347,92 347,102" fill="#333"/>
    <!-- Null -->
    <text x="375" y="102" font-size="18">∅</text>
  </g>
  <text x="30" y="155" font-family="serif" font-size="11">[ data | next ] → [ data | next ] → [ data | next ] → null</text>
  <text x="30" y="175" font-family="serif" font-size="11">Each node stores data and a pointer to the next node.</text>
</svg>
