<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#e3f2fd"/>
  <text x="10" y="22" font-family="serif" font-size="16" font-weight="bold">Water Cycle</text>
  <!-- Sun -->
  <circle cx="340" cy="60" r="24" fill="#ffd54f"/>
  <text x="325" y="65" font-size="11" font-family="serif">Sun</text>
  <!-- Cloud -->
  <ellipse cx="120" cy="75" rx="55" ry="22" fill="#ffffff" stroke="#90a4ae" stroke-width="1"/>
  <ellipse cx="150" cy="62" rx="32" ry="20" fill="#ffffff" stroke="#90a4ae" stroke-width="1"/>
  <!-- Rain -->
  <g stroke="#1976d2" stroke-width="2">
    <line x1="90" y1="100" x2="84" y2="122"/>
    <line x1="115" y1="100" x2="109" y2="122"/>
    <line x1="140" y1="100" x2="134" y2="122"/>
    <line x1="165" y1="100" x2="159" y2="122"/>
  </g>
  <text x="60" y="145" font-size="11" font-family="serif">Precipitation</text>
  <!-- Water body -->
  <path d="M 0 235 Q 100 225 200 235 T 400 235 L 400 300 L 0 300 Z" fill="#1976d2"/>
  <text x="15" y="270" font-size="12" fill="#ffffff" font-family="serif">Oceans &amp; Lakes</text>
  <!-- Evaporation arrow (curved) -->
  <path d="M 260 225 Q 300 150 320 95" stroke="#455a64" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <polygon points="320,95 315,105 325,104" fill="#455a64"/>
  <text x="265" y="180" font-size="11" font-family="serif">Evaporation</text>
  <!-- Condensation arrow -->
  <path d="M 300 100 Q 220 70 175 65" stroke="#455a64" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <polygon points="178,65 188,60 188,70" fill="#455a64"/>
  <text x="210" y="55" font-size="11" font-family="serif">Condensation</text>
</svg>
